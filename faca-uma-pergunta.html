<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href='https://fonts.googleapis.com/css?family=Poppins:400,600,700' rel='stylesheet'>

  <link href="./assets/css/style.css" rel="stylesheet">
  <link href="./assets/css/index.css" rel="stylesheet">
  <title>ConscientizAI</title>
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg" style="background-color: #2F93E4;">
      <div class="container-fluid mx-auto" style="max-width: 1120px;">
        <a class="navbar-brand me-5" href="./index.html">ConscientizAI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-4">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./index.html">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./blog.html">Blog</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./quem-somos.html">Quem Somos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./ia-verde.html">IA Verde</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./historia-ia.html">História da IA</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./mitos-e-verdades.html">Mitos & Verdades</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div class="container">

      <div class="my-4 p-5 bg-body rounded">
        <h4 class='mb-3 fw-normal' id="question-search-section">Pesquise por dúvidas já respondidas</h4>
        <div class="px-3">
          <div class="rounded p-3 mb-4" id="question-search">
            <form class="m-0" id="question-search-form">
              <div class="d-flex align-items-center">
                <input type="text" id="searchQuestion" name="search" class="form-control me-3" aria-describedby="searchQuestion">
                <button class="btn btn-outline-light btn-lg border border-2"><i class="bi bi-search"></i></button>
              </div>
            </form>
          </div>
          <div class="border rounded mb-5 overflow-auto" style="max-height: 300px;" id='search-result'></div>
        </div>
      </div>

      <div class="my-4 p-5 bg-body rounded">
        <div class="mb-4">
          <h4 class='mb-3 fw-normal' id="publish-question-section">Publique sua dúvida</h4>
          <p class="">Dúvidas publicadas serão respondidas pela equipe do projeto e suas respostas ficam disponíveis para consulta</p>
        </div>
        <div class="rounded p-3 mb-4 border border-primary-subtle border-2">
          <form class="m-0" id="question-form">
            <div class="mb-4">
              <label for="question" class="form-label">Campo para pergunta:</label>
              <textarea class="form-control" id="question" rows="5" name="content"></textarea>
            </div>
            <p>Informações de Contato</p>
            <fieldset class="px-3 w-50">
              <div class="mb-3">
                <label for="name" class="form-label">Nome:</label>
                <input type="text" class="form-control" id="name" name="name" aria-describedby="emailHelp">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp">
              </div>
            </fieldset>
            <div class="d-flex justify-content-center py-3">
              <input type="submit" class="btn btn-primary px-4" style="letter-spacing: 2px;" value="PUBLICAR">
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
    <div id="updateToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">
        </div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="./assets/js/question.js" type="module"></script>
</body>

</html>
