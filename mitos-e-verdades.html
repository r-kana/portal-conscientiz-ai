<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitos e Verdades sobre IA</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="quiz-container">
    <h1>Mitos e Verdades sobre IA</h1>

    <div class="progress">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="info">
      <span>Pontuação: <strong id="score">0</strong></span>
      <span><strong id="current">1</strong> / <strong id="total">10</strong></span>
    </div>

    <div class="card" id="card">
      <p class="question" id="question">Carregando...</p>

      <div class="buttons">
        <button class="btn mito" onclick="answer('mito')">Mito</button>
        <button class="btn verdade" onclick="answer('verdade')">Verdade</button>
      </div>

      <div class="result" id="result">
        <p id="result-text"></p>
        <button class="next" onclick="next()">Próxima →</button>
      </div>
    </div>

    <div class="end" id="end">
      <h2>Resultado</h2>
      <p class="final-score"><strong id="final">0</strong> de 10</p>
      <p id="message"></p>
      <button class="restart" onclick="restart()">Jogar Novamente</button>
    </div>
  </div>

  <script>
    const perguntas = [
      { q: "O termo 'Inteligência Artificial' foi criado antes da década de 80.", a: "verdade", e: "Na verdade, o termo 'Inteligência Artificial' foi proposto em 1956 por Jhon McCarthy, um cientista da computação norte-americano. Porém, os fundamentos teóricos deste termo, já vinham sendo discutidos desde o início da década de 50, com as pesquisas do cientista da computação britânico Alan Turing." },

      { q: "Os humanos serão completamente substituídos pela IA em suas profissões.", a: "mito", e: "A automação já é uma realidade, mas isso não quer dizer que a IA vai acabar com todos os empregos. O que está acontecendo é uma mudança no mercado de trabalho. As máquinas podem assumir tarefas repetitivas, mas habilidades como criatividade, inteligência emocional, pensamento estratégico e tomada de decisão continuam sendo importantes e bem humanas. Muitas profissões vão se adaptar, e novas vão surgir à medida que a IA for sendo usada em diferentes áreas." },

      { q: "A IA pensa como um ser humano.", a: "mito", e: "Apesar de parecer muito inteligente, a IA não tem consciência, emoções nem intenção própria. Ela só gera respostas com base em padrões aprendidos a partir de dados. Quando um modelo de linguagem como o Gemini ou o ChatGPT responde a algo, ele não entende de verdade como um humano entenderia. Na prática, ele apenas prevê qual é a sequência de palavras mais provável para formar uma resposta que faça sentido." },

      { q: "Inteligências Artificiais podem ser tendenciosas.", a: "verdade", e: "A IA aprende a partir de dados históricos e padrões encontrados em textos, imagens e informações criadas por seres humanos. Se esses dados contiverem preconceitos, opiniões tendenciosas ou informações incorretas, a IA pode acabar repetindo e até reforçando esses problemas em suas respostas. Além disso, muitas IAs são projetadas para manter a conversa fluida e agradável, o que faz com que, em alguns casos, elas tendam a concordar com o usuário ou apresentem respostas com muita confiança, mesmo quando estão erradas. Por isso, a supervisão humana é essencial para verificar informações, corrigir erros e criar limites que reduzam respostas discriminatórias ou enganosas." },

      { q: "A IA consegue aprender sozinha a partir de dados.", a: "verdade", e: "Sistemas de IA utilizam técnicas de aprendizado de máquina (Machine Learning) para identificar padrões em grandes volumes de dados e melhorar resultados ao longo do tempo. Porém, esse aprendizado ainda depende de dados fornecidos por humanos." },

      { q: "Aplicativos como Spotify, Netflix e TikTok usam IA.", a: "verdade", e: "Esses aplicativos utilizam Inteligência Artificial para analisar o comportamento dos usuários e personalizar a experiência de cada pessoa. A IA observa informações como músicas ou vídeos assistidos, tempo de visualização, curtidas, pesquisas e conteúdos ignorados. Com base nesses padrões, os algoritmos tentam prever o que provavelmente será mais interessante para o usuário, gerando recomendações personalizadas. É por isso que duas pessoas usando a mesma plataforma costumam receber sugestões completamente diferentes." },

      { q: "Assistentes virtuais como Alexa, Siri e Google Assistente usam IA.", a: "verdade", e: "Esses assistentes utilizam IA para reconhecer voz, interpretar perguntas, responder comandos e aprender preferências do usuário ao longo do uso." },

      { q: "A Inteligência Artificial funciona apenas quando está conectada à internet.", a: "mito", e: "Muitas pessoas acreditam que toda IA depende da internet para funcionar, mas isso não é verdade. Alguns sistemas de IA podem operar diretamente em celulares, computadores, carros e outros dispositivos sem conexão online. Um exemplo são recursos de reconhecimento facial ou assistentes de câmera em smartphones. A internet normalmente é usada para acessar modelos mais avançados ou atualizar informações em tempo real." },

      { q: "Estudar somente através da IA pode limitar sua capacidade de aprender.", a: "verdade", e: "A Inteligência Artificial pode facilitar muito os estudos ao resumir conteúdos, responder dúvidas e gerar explicações rápidas. Porém, depender exclusivamente dela pode prejudicar o desenvolvimento de habilidades importantes, como interpretação, pensamento crítico, pesquisa e resolução de problemas. O aprendizado mais eficiente normalmente acontece quando a IA é usada como ferramenta de apoio, junto com leitura, prática, exercícios e análise própria do estudante." },

      { q: "A Inteligência Artificial pode ser usada para combater fraudes digitais.", a: "verdade", e: "Empresas e bancos utilizam sistemas de IA para identificar comportamentos suspeitos em transações financeiras, acessos e compras online. A IA consegue analisar milhares de operações em poucos segundos e detectar padrões incomuns que podem indicar golpes ou invasões. Isso ajuda a aumentar a segurança digital e reduzir prejuízos causados por fraudes." }
    ];

    let i = 0, s = 0, done = false;

    function load() {
      document.getElementById('question').textContent = perguntas[i].q;
      document.getElementById('current').textContent = i + 1;
      document.getElementById('progress').style.width = (i / perguntas.length * 100) + '%';
      document.getElementById('result').classList.remove('show', 'correct', 'wrong');
      document.querySelectorAll('.btn').forEach(b => b.disabled = false);
      done = false;
    }

    function answer(choice) {
      if (done) return;
      done = true;
      const correct = perguntas[i].a === choice;
      const r = document.getElementById('result');
      const t = document.getElementById('result-text');

      if (correct) {
        s++;
        document.getElementById('score').textContent = s;
        r.classList.add('show', 'correct');
        t.textContent = '✅ Correto! ' + perguntas[i].e;
      } else {
        r.classList.add('show', 'wrong');
        t.textContent = '❌ Errado! "' + (perguntas[i].a === 'verdade' ? 'Verdade' : 'Mito') + '". ' + perguntas[i].e;
      }
      document.querySelectorAll('.btn').forEach(b => b.disabled = true);
    }

    function next() {
      i++;
      if (i < perguntas.length) load();
      else showEnd();
    }

    function showEnd() {
      document.getElementById('progress').style.width = '100%';
      document.getElementById('card').style.display = 'none';
      document.getElementById('end').style.display = 'block';
      document.getElementById('final').textContent = s;

      const m = document.getElementById('message');
      if (s >= 8) m.textContent = '🎉 Parabéns! Você é expert em IA!';
      else if (s >= 5) m.textContent = '👍 Bom trabalho! Continue aprendendo!';
      else m.textContent = '📚 Continue estudando sobre IA!';
    }

    function restart() {
      i = 0; s = 0; done = false;
      document.getElementById('score').textContent = '0';
      document.getElementById('card').style.display = 'block';
      document.getElementById('end').style.display = 'none';
      load();
    }

    load();
  </script>
</body>

</html>
